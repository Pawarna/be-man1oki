openapi: 3.0.0
info:
  title: BE-MAN1OKI API
  description: API Backend untuk Sistem Manajemen Sekolah
  version: 1.0.0
  contact:
    name: Support
    email: support@man1oki.id

servers:
  - url: http://localhost:3000/api
    description: Development Server
  - url: https://api.man1oki.id
    description: Production Server

tags:
  - name: Authentication
    description: Login dan autentikasi admin
  - name: Users
    description: Manajemen pengguna dan admin
  - name: News
    description: Manajemen berita/artikel sekolah
  - name: Categories
    description: Manajemen kategori berita
  - name: Upload
    description: Upload file media

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT dari login

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID pengguna dari Supabase Auth
        name:
          type: string
          maxLength: 255
          description: Nama pengguna
        email:
          type: string
          format: email
          description: Email pengguna
        role:
          type: string
          enum: [admin, teacher, student]
          description: Role pengguna
        createdAt:
          type: string
          format: date-time
          description: Waktu dibuat

    News:
      type: object
      properties:
        id:
          type: integer
          description: ID berita
        title:
          type: string
          maxLength: 255
          description: Judul berita
        slug:
          type: string
          description: URL slug berita yang unik
        content:
          type: object
          description: Konten Tiptap JSON (hanya dalam detail endpoint)
        thumbnail:
          type: string
          format: uri
          description: URL thumbnail berita di storage
        status:
          type: string
          enum: [draft, published, archived]
          description: Status publikasi berita
        author:
          type: object
          description: Informasi penulis berita
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        category:
          type: object
          nullable: true
          description: Informasi kategori berita
          properties:
            id:
              type: integer
            name:
              type: string
        createdAt:
          type: string
          format: date-time
          description: Waktu dibuat
        updatedAt:
          type: string
          format: date-time
          description: Waktu diperbarui (hanya dalam detail endpoint)

    Category:
      type: object
      properties:
        id:
          type: integer
          description: ID kategori
        name:
          type: string
          maxLength: 100
          description: Nama kategori
        slug:
          type: string
          maxLength: 100
          description: URL slug kategori

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Status keberhasilan request
        message:
          type: string
          description: Pesan respons
        data:
          type: object
          description: Data hasil request
        error:
          type: object
          description: Detail error jika ada

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object

paths:
  # ==========================================
  # AUTHENTICATION ENDPOINTS
  # ==========================================
  /users/login:
    post:
      tags:
        - Authentication
      summary: Login Admin
      description: Melakukan login dan mendapatkan access token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: admin@man1oki.id
                password:
                  type: string
                  minLength: 1
                  example: password123
              required:
                - email
                - password
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login berhasil!
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        description: JWT token untuk autentikasi
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Validasi gagal atau email/password salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Email atau password tidak valid
        '500':
          description: Error server

  # ==========================================
  # USER ENDPOINTS
  # ==========================================
  /users/setup-admin:
    post:
      tags:
        - Users
      summary: Setup Admin Pertama Kali
      description: Membuat akun admin untuk pertama kali di sistem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 100
                  example: Kepala Sekolah
                email:
                  type: string
                  format: email
                  example: admin@man1oki.id
                password:
                  type: string
                  minLength: 6
                  maxLength: 50
                  example: AdminPassword123
              required:
                - name
                - email
                - password
      responses:
        '201':
          description: Admin berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin berhasil dibuat!
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error server

  /users/dashboard:
    get:
      tags:
        - Users
      summary: Ambil Data Dashboard Admin
      description: Mengambil informasi dashboard admin termasuk statistik
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Data dashboard berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Selamat datang di Dashboard Admin
                  data:
                    type: object
                    properties:
                      adminProfile:
                        $ref: '#/components/schemas/User'
                      stats:
                        type: object
                        properties:
                          totalNews:
                            type: integer
                            example: 15
                          totalStudents:
                            type: integer
                            example: 320
                          recentActivity:
                            type: string
                            example: Server running stable
        '401':
          description: Token tidak valid atau tidak ada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error server

  # ==========================================
  # NEWS ENDPOINTS
  # ==========================================
  /news:
    get:
      tags:
        - News
      summary: Daftar Semua Berita
      description: Mengambil daftar semua berita yang telah dipublikasikan (publik, tidak perlu autentikasi)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, archived]
          description: Filter berdasarkan status (opsional, belum diimplementasi)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Nomor halaman untuk pagination (opsional, belum diimplementasi)
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Jumlah item per halaman (opsional, belum diimplementasi)
      responses:
        '200':
          description: Daftar berita berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Daftar berita berhasil diambil
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/News'
        '500':
          description: Error server

    post:
      tags:
        - News
      summary: Buat Berita Baru
      description: Membuat berita baru di sistem dengan upload thumbnail (hanya untuk admin yang login)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 5
                  maxLength: 255
                  example: Juara Lomba Science Olympiad 2024
                content:
                  type: string
                  description: Konten JSON dari Tiptap editor (dikirim sebagai string)
                  example: '{"type":"doc","content":[{"type":"paragraph","content":[{"type":"text","text":"Siswa kami telah meraih juara..."}]}]}'
                thumbnail:
                  type: string
                  format: binary
                  description: File gambar thumbnail (JPG, PNG, WebP, etc) - WAJIB
                status:
                  type: string
                  enum: [draft, published, archived]
                  default: draft
                  example: published
                categoryId:
                  type: string
                  nullable: true
                  example: '1'
              required:
                - title
                - content
                - thumbnail
      responses:
        '201':
          description: Berita berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Berita berhasil diterbitkan
                  data:
                    $ref: '#/components/schemas/News'
        '400':
          description: Validasi gagal atau file thumbnail tidak diupload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: File thumbnail wajib diupload
        '401':
          description: Token tidak valid atau tidak ada
        '500':
          description: Error server

  /news/{slug}:
    get:
      tags:
        - News
      summary: Detail Berita
      description: Mengambil detail berita berdasarkan slug URL
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: juara-lomba-science-olympiad-2024
      responses:
        '200':
          description: Detail berita berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Detail berita berhasil diambil
                  data:
                    $ref: '#/components/schemas/News'
        '404':
          description: Berita tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error server

  /news/{id}:
    put:
      tags:
        - News
      summary: Update Berita
      description: Mengupdate berita yang sudah ada berdasarkan ID (thumbnail bersifat opsional)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 5
                  maxLength: 255
                  example: Juara Lomba Science Olympiad 2024 (Update)
                content:
                  type: string
                  description: Konten JSON dari Tiptap editor (dikirim sebagai string)
                  example: '{"type":"doc","content":[{"type":"paragraph","content":[{"type":"text","text":"Update berita..."}]}]}'
                thumbnail:
                  type: string
                  format: binary
                  description: File gambar thumbnail baru (JPG, PNG, WebP, etc) - OPSIONAL
                status:
                  type: string
                  enum: [draft, published, archived]
                  example: published
                categoryId:
                  type: string
                  nullable: true
                  example: '2'
      responses:
        '200':
          description: Berita berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Berita berhasil diperbarui
                  data:
                    $ref: '#/components/schemas/News'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
        '401':
          description: Token tidak valid atau tidak ada
        '404':
          description: Berita tidak ditemukan
        '500':
          description: Error server

    delete:
      tags:
        - News
      summary: Hapus Berita
      description: Menghapus berita berdasarkan ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Berita berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Berita berhasil dihapus
        '401':
          description: Token tidak valid atau tidak ada
        '404':
          description: Berita tidak ditemukan
        '500':
          description: Error server

  # ==========================================
  # UPLOAD ENDPOINTS
  # ==========================================
  /upload/image:
    post:
      tags:
        - Upload
      summary: Upload Gambar
      description: Upload gambar untuk Tiptap editor atau thumbnail berita
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: File gambar (JPG, PNG, WebP, etc)
              required:
                - image
      responses:
        '200':
          description: Gambar berhasil diupload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Gambar berhasil diupload
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
                        example: https://storage.googleapis.com/bucket/image-12345.jpg
        '400':
          description: File gambar tidak ditemukan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: File gambar tidak ditemukan
        '401':
          description: Token tidak valid atau tidak ada
        '413':
          description: Ukuran file terlalu besar
        '415':
          description: Format file tidak didukung
        '500':
          description: Error server

  # ==========================================
  # CATEGORY ENDPOINTS
  # ==========================================
  /categories:
    get:
      tags:
        - Categories
      summary: Daftar Semua Kategori
      description: Mengambil daftar semua kategori berita (publik, tidak perlu autentikasi)
      responses:
        '200':
          description: Daftar kategori berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Daftar kategori berhasil diambil
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
        '500':
          description: Error server

    post:
      tags:
        - Categories
      summary: Buat Kategori Baru
      description: Membuat kategori berita baru (hanya untuk admin yang login)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Pengumuman Penting
              required:
                - name
      responses:
        '201':
          description: Kategori berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Kategori berhasil ditambahkan
                  data:
                    $ref: '#/components/schemas/Category'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
        '401':
          description: Token tidak valid atau tidak ada
        '500':
          description: Error server

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Detail Kategori
      description: Mengambil detail kategori berdasarkan ID (publik)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Detail kategori berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Detail kategori berhasil diambil
                  data:
                    $ref: '#/components/schemas/Category'
        '404':
          description: Kategori tidak ditemukan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Kategori tidak ditemukan
        '500':
          description: Error server

    put:
      tags:
        - Categories
      summary: Update Kategori
      description: Mengupdate kategori berdasarkan ID (hanya untuk admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Pengumuman Penting (Update)
              required:
                - name
      responses:
        '200':
          description: Kategori berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Kategori berhasil diperbarui
                  data:
                    $ref: '#/components/schemas/Category'
        '400':
          description: Validasi gagal
        '401':
          description: Token tidak valid atau tidak ada
        '404':
          description: Kategori tidak ditemukan
        '500':
          description: Error server

    delete:
      tags:
        - Categories
      summary: Hapus Kategori
      description: Menghapus kategori berdasarkan ID (hanya untuk admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Kategori berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Kategori berhasil dihapus
        '401':
          description: Token tidak valid atau tidak ada
        '404':
          description: Kategori tidak ditemukan
        '409':
          description: Kategori tidak dapat dihapus karena masih digunakan oleh berita
        '500':
          description: Error server

# ==========================================
# SECURITY DEFINITIONS
# ==========================================
security:
  - BearerAuth: []
