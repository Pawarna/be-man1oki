openapi: 3.0.3
info:
  title: MAN 1 OKI - Admin API
  version: 1.0.0
  description: >-
    Admin-facing API for managing Berita, Galeri, Kegiatan, and Pengumuman
    (designed to match the frontend stores in this repository).
servers:
  - url: http://localhost:3000/api
    description: Local dev server
tags:
  - name: Berita
  - name: Galeri
  - name: Kegiatan
  - name: Pengumuman
paths:
  /berita:
    get:
      tags: [Berita]
      summary: List berita (with optional pagination and filter)
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: text search in title or excerpt
        - name: status
          in: query
          schema:
            type: string
            enum: [published, draft]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: Page number (1-based)
        - name: perPage
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: A paginated list of berita
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BeritaItem'
                  total:
                    type: integer
                  page:
                    type: integer
                  perPage:
                    type: integer
    post:
      tags: [Berita]
      summary: Create berita
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category, date, status, author, content, excerpt, image]
              properties:
                title:
                  type: string
                category:
                  type: string
                date:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [published, draft]
                author:
                  type: string
                content:
                  type: string
                excerpt:
                  type: string
                image:
                  type: string
                  format: binary
                  description: Image file
      responses:
        '201':
          description: Berita created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeritaItem'
  /berita/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Berita]
      summary: Get berita by id
      responses:
        '200':
          description: Berita found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeritaItem'
        '404':
          description: Not found
    put:
      tags: [Berita]
      summary: Update berita by id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category, date, status, author, content, excerpt, image]
              properties:
                title:
                  type: string
                category:
                  type: string
                date:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [published, draft]
                author:
                  type: string
                content:
                  type: string
                excerpt:
                  type: string
                image:
                  type: string
                  format: binary
                  description: Image file
      responses:
        '200':
          description: Updated
    delete:
      tags: [Berita]
      summary: Delete berita by id
      responses:
        '204':
          description: Deleted

  /galeri:
    get:
      tags: [Galeri]
      summary: List galeri
      responses:
        '200':
          description: List of galeri
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GaleriItem'
    post:
      tags: [Galeri]
      summary: Create galeri item
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category, url, date]
              properties:
                title:
                  type: string
                category:
                  type: string
                url:
                  type: string
                  format: binary
                  description: Image file
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: Created
  /galeri/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Galeri]
      summary: Get galeri by id
      responses:
        '200':
          description: Galeri item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GaleriItem'
    put:
      tags: [Galeri]
      summary: Update galeri
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category, url, date]
              properties:
                title:
                  type: string
                category:
                  type: string
                url:
                  type: string
                  format: binary
                  description: Image file
                date:
                  type: string
                  format: date
      responses:
        '200':
          description: Updated
    delete:
      tags: [Galeri]
      summary: Delete galeri
      responses:
        '204':
          description: Deleted

  /kegiatan:
    get:
      tags: [Kegiatan]
      summary: List kegiatan
      responses:
        '200':
          description: List of kegiatan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KegiatanItem'
    post:
      tags: [Kegiatan]
      summary: Create kegiatan
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, image, description, schedule, coordinator, status]
              properties:
                name:
                  type: string
                image:
                  type: string
                  format: binary
                  description: Image file
                description:
                  type: string
                schedule:
                  type: string
                coordinator:
                  type: string
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '201':
          description: Created
  /kegiatan/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Kegiatan]
      summary: Get kegiatan by id
      responses:
        '200':
          description: Kegiatan item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KegiatanItem'
    put:
      tags: [Kegiatan]
      summary: Update kegiatan
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, image, description, schedule, coordinator, status]
              properties:
                name:
                  type: string
                image:
                  type: string
                  format: binary
                  description: Image file
                description:
                  type: string
                schedule:
                  type: string
                coordinator:
                  type: string
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: Updated
    delete:
      tags: [Kegiatan]
      summary: Delete kegiatan
      responses:
        '204':
          description: Deleted

  /pengumuman:
    get:
      tags: [Pengumuman]
      summary: List pengumuman
      responses:
        '200':
          description: List of pengumuman
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PengumumanItem'
    post:
      tags: [Pengumuman]
      summary: Create pengumuman
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category, pdfUrl, date, expiry, priority, status]
              properties:
                title:
                  type: string
                category:
                  type: string
                pdfUrl:
                  type: string
                  format: binary
                  description: PDF file
                date:
                  type: string
                  format: date
                expiry:
                  type: string
                  format: date
                priority:
                  type: string
                  enum: [high, medium, low]
                status:
                  type: string
                  enum: [active, expired]
      responses:
        '201':
          description: Created
  /pengumuman/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Pengumuman]
      summary: Get pengumuman by id
      responses:
        '200':
          description: Pengumuman item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PengumumanItem'
    put:
      tags: [Pengumuman]
      summary: Update pengumuman
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category, pdfUrl, date, expiry, priority, status]
              properties:
                title:
                  type: string
                category:
                  type: string
                pdfUrl:
                  type: string
                  format: binary
                  description: PDF file
                date:
                  type: string
                  format: date
                expiry:
                  type: string
                  format: date
                priority:
                  type: string
                  enum: [high, medium, low]
                status:
                  type: string
                  enum: [active, expired]
      responses:
        '200':
          description: Updated
    delete:
      tags: [Pengumuman]
      summary: Delete pengumuman
      responses:
        '204':
          description: Deleted

components:
  schemas:
    BeritaItem:
      type: object
      required: [id, title, category, date, status, author, content, excerpt, image]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
          enum: [published, draft]
        author:
          type: string
        content:
          type: string
          description: HTML content (frontend stores HTML)
        excerpt:
          type: string
        image:
          type: string
          description: URL or path to image
    BeritaInput:
      type: object
      required: [title, category, date, status, author, content, excerpt, image]
      properties:
        title:
          type: string
        category:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
          enum: [published, draft]
        author:
          type: string
        content:
          type: string
        excerpt:
          type: string
        image:
          type: string

    GaleriItem:
      type: object
      required: [id, title, category, url, date]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        url:
          type: string
          description: image URL or path
        date:
          type: string
          format: date
    GaleriInput:
      type: object
      required: [title, category, url, date]
      properties:
        title:
          type: string
        category:
          type: string
        url:
          type: string
        date:
          type: string
          format: date

    KegiatanItem:
      type: object
      required: [id, name, image, description, schedule, coordinator, status]
      properties:
        id:
          type: integer
        name:
          type: string
        image:
          type: string
          description: image URL or path
        description:
          type: string
        schedule:
          type: string
        coordinator:
          type: string
        status:
          type: string
          enum: [active, inactive]
    KegiatanInput:
      type: object
      required: [name, image, description, schedule, coordinator, status]
      properties:
        name:
          type: string
        image:
          type: string
          description: image URL or path
        description:
          type: string
        schedule:
          type: string
        coordinator:
          type: string
        status:
          type: string
          enum: [active, inactive]

    PengumumanItem:
      type: object
      required: [id, title, category, pdfUrl, date, expiry, priority, status]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        pdfUrl:
          type: string
          description: URL or path to PDF file
        date:
          type: string
          format: date
        expiry:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [active, expired]
    PengumumanInput:
      type: object
      required: [title, category, pdfUrl, date, expiry, priority, status]
      properties:
        title:
          type: string
        category:
          type: string
        pdfUrl:
          type: string
          description: URL or path to PDF file
        date:
          type: string
          format: date
        expiry:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [active, expired]

  responses:
    NotFound:
      description: Resource not found
    ValidationError:
      description: Invalid input
